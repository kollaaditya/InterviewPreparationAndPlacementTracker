<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coding Submissions — IPPT</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body { background:#f1f5f9; min-height:100vh; }

/* ── Navbar ── */
.navbar {
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    color:white; padding:0 40px;
    display:flex; justify-content:space-between; align-items:center;
    height:64px; box-shadow:0 2px 12px rgba(37,99,235,0.3);
    position:sticky; top:0; z-index:100;
}
.nav-brand { font-size:18px; font-weight:700; }
.nav-right  { display:flex; gap:12px; align-items:center; }
.btn-nav-link {
    padding:7px 16px; background:rgba(255,255,255,0.15);
    color:white; border:1px solid rgba(255,255,255,0.3);
    border-radius:8px; text-decoration:none; font-size:13px;
    transition:background 0.2s;
}
.btn-nav-link:hover { background:rgba(255,255,255,0.28); }

/* ── Container ── */
.container { max-width:1000px; margin:36px auto; padding:0 20px; }

/* ── Student identity banner ── */
.student-banner {
    background:white; border-radius:16px;
    padding:24px 28px; margin-bottom:28px;
    box-shadow:0 2px 12px rgba(0,0,0,0.07);
    display:flex; align-items:center; gap:20px;
    border-left:5px solid #2563eb;
}
.student-avatar {
    width:56px; height:56px; border-radius:50%;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:700; color:white;
    flex-shrink:0; text-transform:uppercase;
}
.student-details { flex:1; }
.student-name {
    font-size:20px; font-weight:700; color:#1e293b; line-height:1.2;
}
.student-meta {
    display:flex; gap:20px; margin-top:6px; flex-wrap:wrap;
}
.student-meta-item {
    display:flex; align-items:center; gap:6px;
    font-size:13px; color:#64748b;
}
.student-meta-item strong { color:#2563eb; font-weight:600; }
.test-type-badge {
    padding:6px 16px; border-radius:20px;
    background:#eff6ff; color:#2563eb;
    font-size:13px; font-weight:600; flex-shrink:0;
}

/* ── Page title ── */
.page-title { font-size:22px; font-weight:700; color:#1e293b; margin-bottom:24px; }

/* ── Stats row ── */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
.stat-card {
    background:white; border-radius:12px; padding:18px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06); display:flex; align-items:center; gap:14px;
}
.stat-icon { font-size:26px; }
.stat-val  { font-size:22px; font-weight:700; color:#1e293b; line-height:1; }
.stat-lbl  { font-size:11px; color:#94a3b8; margin-top:2px; }

/* ── Submission cards ── */
.sub-card {
    background:white; border-radius:14px; padding:20px 24px;
    margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06);
    transition:transform 0.15s, box-shadow 0.15s;
}
.sub-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.1); }

.sub-card-top {
    display:flex; align-items:flex-start; gap:16px;
}
.sub-num {
    width:40px; height:40px; border-radius:10px;
    background:#eff6ff; color:#2563eb;
    font-weight:700; font-size:13px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.sub-info  { flex:1; min-width:0; }
.sub-title { font-size:15px; font-weight:600; color:#1e293b; margin-bottom:8px; }

.sub-meta  {
    display:flex; gap:10px; flex-wrap:wrap;
    align-items:center; margin-bottom:8px; font-size:12px; color:#64748b;
}

/* ── Student ID chip on card ── */
.card-student-chip {
    display:inline-flex; align-items:center; gap:5px;
    background:#eff6ff; border:1px solid #dbeafe;
    border-radius:20px; padding:3px 10px;
    font-size:11px; color:#64748b; font-weight:500;
}
.card-student-chip strong { color:#2563eb; }

.status-pill {
    padding:3px 10px; border-radius:20px;
    font-size:11px; font-weight:600; color:white;
}
.sub-output {
    background:#f8fafc; border:1px solid #e2e8f0;
    border-radius:8px; padding:10px 14px;
    font-family:'Fira Code',monospace; font-size:12px; color:#374151;
    max-height:72px; overflow:hidden; cursor:pointer;
    transition:max-height 0.35s ease;
    margin-top:10px; line-height:1.6; white-space:pre-wrap;
}
.sub-output.expanded { max-height:320px; overflow-y:auto; }
.sub-output-hint {
    font-size:11px; color:#94a3b8; margin-top:4px;
    font-style:italic;
}

/* ── Empty / loading ── */
.empty-msg   { text-align:center; padding:60px 20px; color:#94a3b8; font-size:15px; }
.loading-msg { text-align:center; padding:60px 20px; color:#94a3b8; }
</style>
</head>
<body>

<div class="navbar">
    <div class="nav-brand">💻 Coding Submissions — IPPT</div>
    <div class="nav-right">
        <a class="btn-nav-link" href="codingquestions.html">← Back to Problems</a>
        <a class="btn-nav-link" href="studentdashboard.html">🏠 Dashboard</a>
    </div>
</div>

<div class="container">

    <!-- Student Identity Banner -->
    <div class="student-banner">
        <div class="student-avatar" id="studentAvatar">S</div>
        <div class="student-details">
            <div class="student-name" id="bannerName">Loading…</div>
            <div class="student-meta">
                <div class="student-meta-item">🪪 Student ID: <strong id="bannerStudentId">—</strong></div>
                <div class="student-meta-item">📧 <strong id="bannerEmail">—</strong></div>
                <div class="student-meta-item">🏫 <strong id="bannerCollege">—</strong></div>
                <div class="student-meta-item">🌿 <strong id="bannerBranch">—</strong></div>
            </div>
        </div>
        <span class="test-type-badge">💻 Coding Platform</span>
    </div>

    <div class="page-title">📋 Coding Submission History</div>

    <!-- Summary Stats -->
    <div class="stats-row">
        <div class="stat-card"><div class="stat-icon">📤</div><div><div class="stat-val" id="statTotal">0</div><div class="stat-lbl">Total Submissions</div></div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div><div class="stat-val" id="statAccepted">0</div><div class="stat-lbl">Accepted</div></div></div>
        <div class="stat-card"><div class="stat-icon">❌</div><div><div class="stat-val" id="statWrong">0</div><div class="stat-lbl">Wrong Answer</div></div></div>
        <div class="stat-card"><div class="stat-icon">⚡</div><div><div class="stat-val" id="statError">0</div><div class="stat-lbl">Runtime Error</div></div></div>
    </div>

    <!-- Submission List -->
    <div id="subList"><div class="loading-msg">⏳ Loading submissions…</div></div>
</div>

<script src="js/auth.js"></script>
<script src="js/assessment-utils.js"></script>
<script>
const studentId   = requireStudentLogin();
const studentName = sessionStorage.getItem("userName") || "Student";

const STATUS_COLORS = {
    "Accepted":            "#22c55e",
    "Wrong Answer":        "#ef4444",
    "Runtime Error":       "#f97316",
    "Time Limit Exceeded": "#8b5cf6",
    "Pending":             "#64748b",
    "Submitted":           "#2563eb"
};

/* ── Populate banner ── */
async function loadStudentProfile() {
    document.getElementById("bannerName").textContent      = studentName;
    document.getElementById("bannerStudentId").textContent = studentId;
    document.getElementById("studentAvatar").textContent   = studentName.charAt(0).toUpperCase();

    try {
        const res = await fetch(`${API}/student/${studentId}`);
        if (!res.ok) return;
        const s = await res.json();
        document.getElementById("bannerName").textContent    = s.fullName   || studentName;
        document.getElementById("bannerEmail").textContent   = s.email      || "—";
        document.getElementById("bannerCollege").textContent = s.college    || "—";
        document.getElementById("bannerBranch").textContent  = s.branch     || "—";
        document.getElementById("studentAvatar").textContent = (s.fullName || studentName).charAt(0).toUpperCase();
    } catch { /* session data is enough */ }
}

/* ── Load submissions ── */
async function loadSubmissions() {
    const res = await fetch(`${API}/coding/submissions/${studentId}`);
    const el  = document.getElementById("subList");
    if (!res.ok) { el.innerHTML = `<div class="empty-msg">❌ Failed to load submissions.</div>`; return; }

    const subs = await res.json();

    document.getElementById("statTotal").textContent    = subs.length;
    document.getElementById("statAccepted").textContent = subs.filter(s => s.status === "Accepted").length;
    document.getElementById("statWrong").textContent    = subs.filter(s => s.status === "Wrong Answer").length;
    document.getElementById("statError").textContent    = subs.filter(s => s.status === "Runtime Error").length;

    if (subs.length === 0) {
        el.innerHTML = `
            <div class="empty-msg">
                <p style="font-size:40px;margin-bottom:12px">💻</p>
                <p>No submissions yet — solve a coding problem to get started!</p>
            </div>`;
        return;
    }

    el.innerHTML = subs.map((s, i) => {
        const color   = STATUS_COLORS[s.status] || "#64748b";
        const qTitle  = s.questionTitle || `Question #${s.questionId}`;
        const hasOut  = s.output && s.output.trim().length > 0;
        return `
        <div class="sub-card">
            <div class="sub-card-top">
                <div class="sub-num">#${i + 1}</div>
                <div class="sub-info">
                    <div class="sub-title">${qTitle}</div>
                    <div class="sub-meta">
                        <span class="status-pill" style="background:${color}">${s.status}</span>
                        <span class="card-student-chip">
                            🪪 ID: <strong>${studentId}</strong>
                            &nbsp;|&nbsp;
                            👤 <strong>${studentName}</strong>
                        </span>
                        <span>🗣 ${s.language}</span>
                        <span>🕒 ${fmtDateTime(s.submittedAt)}</span>
                    </div>
                    ${hasOut ? `
                    <div class="sub-output" onclick="this.classList.toggle('expanded')">${escHtml(s.output)}</div>
                    <div class="sub-output-hint">Click output to expand / collapse</div>
                    ` : ""}
                </div>
            </div>
        </div>`;
    }).join("");
}

function escHtml(s) {
    return (s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

function fmtDateTime(d) {
    if (!d) return "—";
    return new Date(d).toLocaleString("en-IN", {
        day: "2-digit", month: "short", year: "numeric",
        hour: "2-digit", minute: "2-digit"
    });
}

loadStudentProfile();
loadSubmissions();
</script>
</body>
</html>
