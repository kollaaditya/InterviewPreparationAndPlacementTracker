<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 18px 40px;
            font-size: 20px;
            font-weight: 700;
            backdrop-filter: blur(10px);
        }

        .page {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .card h2 {
            text-align: center;
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .card .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #2563eb;
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.9; }

        .link-row {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: #64748b;
        }

        .link-row a {
            color: #2563eb;
            font-weight: 500;
            text-decoration: none;
        }

        .link-row a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="navbar">🎓 IPPT — Interview Preparation & Placement Tracker</div>

    <div class="page">
        <div class="card">
            <h2>🎓 Student Registration</h2>
            <p class="subtitle">Create your student account</p>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="phone" placeholder="Enter phone number">
            </div>
            <div class="form-group">
                <label>College</label>
                <input type="text" id="college" placeholder="Enter college name">
            </div>
            <div class="form-group">
                <label>Branch</label>
                <input type="text" id="branch" placeholder="E.g. Computer Science">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a password">
            </div>

            <button class="btn" onclick="registerStudent()">Register</button>

            <div class="link-row">
                Already have an account? <a href="studentlogin.html">Login</a>
            </div>
            <div class="link-row" style="margin-top:10px;">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
