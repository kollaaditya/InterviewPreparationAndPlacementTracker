<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aptitude Results — IPPT</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body { background:#f1f5f9; min-height:100vh; }

/* ── Navbar ── */
.navbar {
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    color:white; padding:0 40px;
    display:flex; justify-content:space-between; align-items:center;
    height:64px; box-shadow:0 2px 12px rgba(37,99,235,0.3);
    position:sticky; top:0; z-index:100;
}
.nav-brand { font-size:18px; font-weight:700; }
.nav-right  { display:flex; gap:12px; align-items:center; }
.btn-nav-link {
    padding:7px 16px; background:rgba(255,255,255,0.15);
    color:white; border:1px solid rgba(255,255,255,0.3);
    border-radius:8px; text-decoration:none; font-size:13px;
    transition:background 0.2s;
}
.btn-nav-link:hover { background:rgba(255,255,255,0.28); }

/* ── Container ── */
.container { max-width:960px; margin:36px auto; padding:0 20px; }

/* ── Student identity banner ── */
.student-banner {
    background:white; border-radius:16px;
    padding:24px 28px; margin-bottom:28px;
    box-shadow:0 2px 12px rgba(0,0,0,0.07);
    display:flex; align-items:center; gap:20px;
    border-left:5px solid #2563eb;
}
.student-avatar {
    width:56px; height:56px; border-radius:50%;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:700; color:white;
    flex-shrink:0; text-transform:uppercase;
}
.student-details { flex:1; }
.student-name {
    font-size:20px; font-weight:700; color:#1e293b; line-height:1.2;
}
.student-meta {
    display:flex; gap:20px; margin-top:6px; flex-wrap:wrap;
}
.student-meta-item {
    display:flex; align-items:center; gap:6px;
    font-size:13px; color:#64748b;
}
.student-meta-item strong { color:#2563eb; font-weight:600; }
.test-type-badge {
    padding:6px 16px; border-radius:20px;
    background:#eff6ff; color:#2563eb;
    font-size:13px; font-weight:600; flex-shrink:0;
}

/* ── Page title ── */
.page-title { font-size:22px; font-weight:700; color:#1e293b; margin-bottom:24px; }

/* ── Stats row ── */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
.stat-card {
    background:white; border-radius:12px; padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06); display:flex; align-items:center; gap:14px;
}
.stat-icon { font-size:26px; }
.stat-val  { font-size:22px; font-weight:700; color:#1e293b; line-height:1; }
.stat-lbl  { font-size:11px; color:#94a3b8; margin-top:2px; }

/* ── Result cards ── */
.result-card {
    background:white; border-radius:12px; padding:20px 24px;
    margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06);
    display:flex; align-items:center; gap:20px;
    transition:transform 0.15s, box-shadow 0.15s;
}
.result-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.1); }
.score-circle {
    width:64px; height:64px; border-radius:50%;
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; flex-shrink:0;
}
.sc-score { font-size:18px; font-weight:700; color:white; line-height:1; }
.sc-total { font-size:11px; color:rgba(255,255,255,0.85); }
.r-info   { flex:1; }
.r-attempt { font-size:15px; font-weight:600; color:#1e293b; margin-bottom:4px; }
.r-meta  { font-size:13px; color:#94a3b8; display:flex; gap:16px; flex-wrap:wrap; }
.r-pct   { font-size:22px; font-weight:700; flex-shrink:0; }
.pbar-wrap { background:#e2e8f0; border-radius:50px; height:8px; overflow:hidden; margin-top:8px; max-width:260px; }
.pbar-fill { height:100%; border-radius:50px; transition:width 0.8s ease; }

/* ── Student ID chip on card ── */
.card-student-chip {
    display:inline-flex; align-items:center; gap:5px;
    background:#f1f5f9; border:1px solid #e2e8f0;
    border-radius:20px; padding:3px 10px;
    font-size:11px; color:#64748b; font-weight:500;
}
.card-student-chip strong { color:#2563eb; }

/* ── Empty / loading ── */
.empty-msg  { text-align:center; padding:60px 20px; color:#94a3b8; font-size:15px; }
.loading-msg { text-align:center; padding:60px 20px; color:#94a3b8; }
.btn-take {
    padding:12px 28px; background:linear-gradient(90deg,#2563eb,#7c3aed);
    color:white; border:none; border-radius:12px;
    font-size:15px; font-weight:600; cursor:pointer; font-family:'Poppins',sans-serif;
}
</style>
</head>
<body>

<div class="navbar">
    <div class="nav-brand">🧠 Aptitude Results — IPPT</div>
    <div class="nav-right">
        <a class="btn-nav-link" href="aptitudetest.html">🧠 Take Test</a>
        <a class="btn-nav-link" href="studentdashboard.html">← Dashboard</a>
    </div>
</div>

<div class="container">

    <!-- Student Identity Banner -->
    <div class="student-banner">
        <div class="student-avatar" id="studentAvatar">S</div>
        <div class="student-details">
            <div class="student-name" id="bannerName">Loading…</div>
            <div class="student-meta">
                <div class="student-meta-item">🪪 Student ID: <strong id="bannerStudentId">—</strong></div>
                <div class="student-meta-item">📧 <strong id="bannerEmail">—</strong></div>
                <div class="student-meta-item">🏫 <strong id="bannerCollege">—</strong></div>
                <div class="student-meta-item">🌿 <strong id="bannerBranch">—</strong></div>
            </div>
        </div>
        <span class="test-type-badge">🧠 Aptitude Test</span>
    </div>

    <div class="page-title">📊 Aptitude Test History</div>

    <!-- Summary Stats -->
    <div class="stats-row">
        <div class="stat-card"><div class="stat-icon">📝</div><div><div class="stat-val" id="statAttempts">0</div><div class="stat-lbl">Attempts</div></div></div>
        <div class="stat-card"><div class="stat-icon">🏆</div><div><div class="stat-val" id="statBest">—</div><div class="stat-lbl">Best Score</div></div></div>
        <div class="stat-card"><div class="stat-icon">📈</div><div><div class="stat-val" id="statAvg">—</div><div class="stat-lbl">Avg Score %</div></div></div>
        <div class="stat-card"><div class="stat-icon">🕒</div><div><div class="stat-val" id="statLast">—</div><div class="stat-lbl">Last Attempt</div></div></div>
    </div>

    <!-- Result List -->
    <div id="resultList"><div class="loading-msg">⏳ Loading results…</div></div>
</div>

<script src="js/auth.js"></script>
<script src="js/assessment-utils.js"></script>
<script>
const studentId   = requireStudentLogin();
const studentName = sessionStorage.getItem("userName") || "Student";

/* ── Populate banner from session + API ── */
async function loadStudentProfile() {
    // Fill immediately from session storage
    document.getElementById("bannerName").textContent      = studentName;
    document.getElementById("bannerStudentId").textContent = studentId;
    document.getElementById("studentAvatar").textContent   = studentName.charAt(0).toUpperCase();

    // Fetch full profile for extra fields
    try {
        const res = await fetch(`${API}/student/${studentId}`);
        if (!res.ok) return;
        const s = await res.json();
        document.getElementById("bannerName").textContent    = s.fullName   || studentName;
        document.getElementById("bannerEmail").textContent   = s.email      || "—";
        document.getElementById("bannerCollege").textContent = s.college    || "—";
        document.getElementById("bannerBranch").textContent  = s.branch     || "—";
        document.getElementById("studentAvatar").textContent = (s.fullName || studentName).charAt(0).toUpperCase();
    } catch { /* session data is enough */ }
}

function pctColor(p) {
    return p >= 60 ? "#22c55e" : p >= 40 ? "#f59e0b" : "#ef4444";
}

async function loadResults() {
    const res = await fetch(`${API}/aptitude/results/${studentId}`);
    const el  = document.getElementById("resultList");
    if (!res.ok) { el.innerHTML = `<div class="empty-msg">❌ Failed to load results.</div>`; return; }

    const results = await res.json();
    if (results.length === 0) {
        el.innerHTML = `
            <div class="empty-msg">
                <p style="font-size:40px;margin-bottom:12px">🧠</p>
                <p>No aptitude tests taken yet.</p><br>
                <button class="btn-take" onclick="location.href='aptitudetest.html'">🚀 Take Test Now</button>
            </div>`;
        return;
    }

    document.getElementById("statAttempts").textContent = results.length;
    document.getElementById("statBest").textContent     = Math.max(...results.map(r => r.percentage)) + "%";
    document.getElementById("statAvg").textContent      = (results.reduce((a, r) => a + r.percentage, 0) / results.length).toFixed(1) + "%";
    document.getElementById("statLast").textContent     = fmtDate(results[0].submittedDate);

    el.innerHTML = results.map((r, i) => {
        const pct = r.percentage;
        const bg  = pctColor(pct);
        return `
        <div class="result-card">
            <div class="score-circle" style="background:${bg}">
                <div class="sc-score">${r.score}</div>
                <div class="sc-total">/${r.totalQuestions}</div>
            </div>
            <div class="r-info">
                <div class="r-attempt">
                    Attempt #${results.length - i}
                    &nbsp;
                    <span class="card-student-chip">
                        🪪 ID: <strong>${studentId}</strong>
                        &nbsp;|&nbsp;
                        👤 <strong>${studentName}</strong>
                    </span>
                </div>
                <div class="r-meta" style="margin-top:6px">
                    <span>📅 ${fmtDateTime(r.submittedDate)}</span>
                    <span>✅ ${r.score} Correct</span>
                    <span>❌ ${r.totalQuestions - r.score} Wrong</span>
                </div>
                <div class="pbar-wrap">
                    <div class="pbar-fill" style="width:${pct}%;background:${bg}"></div>
                </div>
            </div>
            <div class="r-pct" style="color:${bg}">${pct}%</div>
        </div>`;
    }).join("");
}

loadStudentProfile();
loadResults();
</script>
</body>
</html>
