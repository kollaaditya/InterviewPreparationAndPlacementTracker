<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #1e293b, #374151);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: rgba(255,255,255,0.05);
            color: white;
            padding: 18px 40px;
            font-size: 20px;
            font-weight: 700;
            backdrop-filter: blur(10px);
        }

        .page {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .card h2 { text-align: center; font-size: 24px; color: #1e293b; margin-bottom: 8px; }
        .card .subtitle { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 28px; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid #e2e8f0; border-radius: 8px;
            font-size: 14px; outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #374151; }

        .btn {
            width: 100%; padding: 13px;
            background: linear-gradient(90deg, #1e293b, #374151);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            margin-top: 8px; transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }

        .link-row { text-align: center; margin-top: 18px; font-size: 14px; color: #64748b; }
        .link-row a { color: #374151; font-weight: 500; text-decoration: none; }
        .link-row a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="navbar">⚙️ IPPT — Admin Portal</div>

    <div class="page">
        <div class="card">
            <h2>⚙️ Admin Login</h2>
            <p class="subtitle">Restricted access — Admins only</p>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter admin username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter admin password">
            </div>

            <button class="btn" onclick="loginAdmin()">Login</button>

            <div class="link-row" style="margin-top:18px;">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
