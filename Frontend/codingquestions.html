<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coding Questions — IPPT</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f1f5f9;min-height:100vh;}
.navbar{background:linear-gradient(90deg,#2563eb,#7c3aed);color:white;padding:0 40px;display:flex;justify-content:space-between;align-items:center;height:64px;box-shadow:0 2px 12px rgba(37,99,235,0.3);}
.nav-brand{font-size:18px;font-weight:700;}
.nav-right{display:flex;align-items:center;gap:14px;}
.btn-back{padding:7px 16px;background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3);border-radius:8px;cursor:pointer;font-size:13px;font-family:'Poppins',sans-serif;text-decoration:none;}
.container{max-width:1100px;margin:36px auto;padding:0 20px;}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:14px;}
.page-title{font-size:22px;font-weight:700;color:#1e293b;}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;}
.filter-btn{padding:7px 18px;border:1.5px solid #e2e8f0;border-radius:20px;background:white;color:#64748b;font-size:13px;font-weight:500;cursor:pointer;font-family:'Poppins',sans-serif;transition:all 0.15s;}
.filter-btn.active,.filter-btn:hover{background:linear-gradient(90deg,#2563eb,#7c3aed);color:white;border-color:transparent;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:white;border-radius:12px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;align-items:center;gap:14px;}
.stat-icon{font-size:28px;}
.stat-val{font-size:22px;font-weight:700;color:#1e293b;line-height:1;}
.stat-lbl{font-size:11px;color:#94a3b8;margin-top:2px;}
.q-list{display:flex;flex-direction:column;gap:12px;}
.q-row{background:white;border-radius:12px;padding:20px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;align-items:center;gap:16px;cursor:pointer;transition:all 0.2s;text-decoration:none;color:inherit;}
.q-row:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(37,99,235,0.12);}
.q-num{width:36px;height:36px;border-radius:8px;background:#eff6ff;color:#2563eb;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.q-info{flex:1;}
.q-title{font-size:15px;font-weight:600;color:#1e293b;margin-bottom:4px;}
.q-meta{font-size:12px;color:#94a3b8;display:flex;gap:12px;flex-wrap:wrap;}
.q-meta span{display:flex;align-items:center;gap:4px;}
.diff-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;color:white;}
.diff-easy{background:#22c55e;}
.diff-medium{background:#f59e0b;}
.diff-hard{background:#ef4444;}
.q-arrow{color:#94a3b8;font-size:18px;flex-shrink:0;}
.empty-msg{text-align:center;padding:60px 20px;color:#94a3b8;font-size:15px;}
.loading-msg{text-align:center;padding:60px 20px;color:#94a3b8;}
</style>
</head>
<body>
<div class="navbar">
    <div class="nav-brand">💻 Coding Platform</div>
    <div class="nav-right">
        <a class="btn-back" href="studentdashboard.html">← Dashboard</a>
    </div>
</div>

<div class="container">
    <div class="page-header">
        <div class="page-title">🧩 Coding Questions</div>
        <div class="filter-row">
            <button class="filter-btn active" onclick="filterQ('All',this)">All</button>
            <button class="filter-btn" onclick="filterQ('Easy',this)">Easy</button>
            <button class="filter-btn" onclick="filterQ('Medium',this)">Medium</button>
            <button class="filter-btn" onclick="filterQ('Hard',this)">Hard</button>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card"><div class="stat-icon">🧩</div><div><div class="stat-val" id="statTotal">0</div><div class="stat-lbl">Total Questions</div></div></div>
        <div class="stat-card"><div class="stat-icon">🟢</div><div><div class="stat-val" id="statEasy">0</div><div class="stat-lbl">Easy</div></div></div>
        <div class="stat-card"><div class="stat-icon">🟡</div><div><div class="stat-val" id="statMedium">0</div><div class="stat-lbl">Medium</div></div></div>
        <div class="stat-card"><div class="stat-icon">🔴</div><div><div class="stat-val" id="statHard">0</div><div class="stat-lbl">Hard</div></div></div>
    </div>

    <div class="q-list" id="questionList"><div class="loading-msg">⏳ Loading questions…</div></div>
</div>

<script src="js/auth.js"></script>
<script src="js/assessment-utils.js"></script>
<script>
requireStudentLogin();

let allQuestions = [];

async function loadQuestions() {
    const res = await fetch(`${API}/codingquestions`);
    if (!res.ok) { document.getElementById("questionList").innerHTML = `<div class="empty-msg">Failed to load questions.</div>`; return; }
    allQuestions = await res.json();

    document.getElementById("statTotal").textContent  = allQuestions.length;
    document.getElementById("statEasy").textContent   = allQuestions.filter(q => q.difficulty === "Easy").length;
    document.getElementById("statMedium").textContent = allQuestions.filter(q => q.difficulty === "Medium").length;
    document.getElementById("statHard").textContent   = allQuestions.filter(q => q.difficulty === "Hard").length;

    renderQuestions(allQuestions);
}

function renderQuestions(list) {
    const el = document.getElementById("questionList");
    if (list.length === 0) {
        el.innerHTML = `<div class="empty-msg">📭 No questions found. Check back later!</div>`;
        return;
    }
    el.innerHTML = list.map((q, i) => `
        <a class="q-row" href="codingeditor.html?id=${q.questionId}">
            <div class="q-num">#${i + 1}</div>
            <div class="q-info">
                <div class="q-title">${q.title}</div>
                <div class="q-meta">
                    <span class="diff-badge diff-${q.difficulty.toLowerCase()}">${q.difficulty}</span>
                    <span>🗣 ${q.language}</span>
                    <span>📅 ${fmtDate(q.createdAt)}</span>
                </div>
            </div>
            <div class="q-arrow">›</div>
        </a>`).join("");
}

function filterQ(diff, btn) {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const filtered = diff === "All" ? allQuestions : allQuestions.filter(q => q.difficulty === diff);
    renderQuestions(filtered);
}

loadQuestions();
</script>
</body>
</html>
